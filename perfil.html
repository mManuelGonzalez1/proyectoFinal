<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil Técnico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-industrial sticky-top">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1">MI PERFIL</span>
        </div>
    </nav>

    <div class="container py-4 mb-5">
        
        <div class="text-center mb-4">
            <div class="d-inline-block bg-white rounded-circle p-1 shadow-sm mb-3">
                <img src="https://ui-avatars.com/api/?name=Manuel+G&background=141f35&color=fff&size=100" class="rounded-circle" alt="Foto Perfil">
            </div>
            <h3 class="fw-bold mb-0">Manuel</h3>
            <p class="text-muted">Técnico de Mantenimiento Nivel 2</p>
        </div>

        <h6 class="fw-bold text-secondary mb-3 text-uppercase">Rendimiento (Abril)</h6>
        <div class="row g-3 mb-4">
            <div class="col-6">
                <div class="card card-custom p-3 text-center h-100">
                    <h2 class="fw-bold text-success mb-0">42</h2>
                    <small class="text-muted">Servicios<br>Completados</small>
                </div>
            </div>
            <div class="col-6">
                <div class="card card-custom p-3 text-center h-100">
                    <h2 class="fw-bold text-primary mb-0">98%</h2>
                    <small class="text-muted">Eficiencia en<br>Tiempos</small>
                </div>
            </div>
        </div>

        <h6 class="fw-bold text-secondary mb-3 text-uppercase">Ajustes</h6>
        <div class="card card-custom overflow-hidden mb-4">
            <ul class="list-group list-group-flush">
                <li class="list-group-item py-3 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-person-gear me-3 text-muted"></i>Editar Datos Personales</span>
                    <i class="bi bi-chevron-right text-muted"></i>
                </li>
                <li class="list-group-item py-3 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-shield-lock me-3 text-muted"></i>Cambiar Contraseña</span>
                    <i class="bi bi-chevron-right text-muted"></i>
                </li>
                <li class="list-group-item py-3 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-bell me-3 text-muted"></i>Notificaciones</span>
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input" type="checkbox" checked>
                    </div>
                </li>
            </ul>
        </div>

        <div class="d-grid mb-5 pb-4">
            <button class="btn btn-outline-danger btn-lg py-3 bg-white">
                <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
            </button>
        </div>

    </div>

    <nav class="navbar fixed-bottom navbar-light bg-white border-top d-lg-none shadow-lg">
        <div class="container-fluid justify-content-around">
            <a href="index.html" class="text-center text-decoration-none text-muted">
                <i class="bi bi-house-door fs-3"></i><br><small>Inicio</small>
            </a>
            <a href="agenda.html" class="text-center text-decoration-none text-muted">
                <i class="bi bi-calendar3 fs-3"></i><br><small>Agenda</small>
            </a>
            <a href="perfil.html" class="text-center text-decoration-none" style="color: #ca2418;">
                <i class="bi bi-person-fill fs-3"></i><br><small>Perfil</small>
            </a>
        </div>
    </nav>

</body>
</html>
