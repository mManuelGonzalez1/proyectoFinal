<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoja de Trabajo - Orden seleccionada | Overhaul Service</title>
    <meta name="description" content="Hoja de trabajo para la orden de servicio, incluye checklist de inspección, formulario para registrar repuestos utilizados, observaciones del técnico y espacio para firma de conformidad del cliente">
    <meta name="keywords" content="servicio técnico, mantenimiento industrial, gestión de órdenes">
    <meta name="author" content="Overhaul Service">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

<header>
    <nav class="navbar navbar-expand-lg navbar-industrial sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="detalle-servicio.html" aria-label="Volver al detalle del servicio">
                <i class="bi bi-x-lg fs-4 me-3 text-white" aria-hidden="true"></i> 
                <span>Cancelar / Volver</span>
            </a>
        </div>
    </nav>
</header>

<main class="container py-4 mb-5">
        
        <section class="report-header mb-4">
            <h1 class=" report-header__title fw-bold">Reporte de Servicio #001</h1>
            <div>
                <p class="report-header__subtitle text-muted"><i class="bi bi-building me-1" aria-hidden="true"></i>Toyota</p>
                <p class="report-header__serial text-muted"> 8FGCU25</p>
                <p class="report-header__model text-muted"> 1H908650</p>
            </div>
        </section>

        <form id="jobOrderForm" class="work-form">
            
            <!-- Sección: Información General del Servicio -->
            <fieldset class="service-information shadow card-custom border-top border-4 border-warning">
                <legend class=" information-legend fw-bold  mb-2">Información General del Servicio</legend>
                <div class=" service-type">
                    <label for="serviceType" class="service-type__label  text-secondary">Tipo de Servicio</label>
                    <select id="serviceType" class="service-type__select   form-select-lg" name="serviceType">
                        <option value="correctivo" selected>Correctivo</option>
                        <option value="preventivo">Preventivo</option>
                        <option value="diagnostico">Diagnóstico</option>
                    </select>
                </div>
                <div class="horometer-container">
                    <label for="horometer" class="horometer-container__label form-label fw-bold text-secondary">Horómetro Actual</label>
                    <input id="horometer" type="number" class=" horometer-container__input form-control form-control-lg bg-light" placeholder="Ej: 4530" name="horometer">
                </div>
            </fieldset>

            <!-- Sección: Formulario de Trabajo -->
            <section class="accordion mb-4 shadow-sm" id="accordionFormulario">
                
                <!-- Subsección: Checklist de Inspección -->
                <article class="accordion-item border-0 rounded-top mb-1">
                    <h2 class="accordion-header">
                        <button class="accordion-button fw-bold py-3" type="button" data-bs-toggle="collapse" data-bs-target="#collapseChecklist">
                            <i class="bi bi-card-checklist me-2 text-primary fs-5" aria-hidden="true"></i> 1. Checklist de Inspección
                        </button>
                    </h2>
                    <div id="collapseChecklist" class="accordion-collapse collapse show" data-bs-parent="#accordionFormulario">
                        <fieldset class="accordion-body">
                            <legend class="visually-hidden">Items de Inspección</legend>
                            <div class="form-check form-switch mb-3 fs-5">
                                <input class="form-check-input" type="checkbox" id="checkRuedas" name="checkRuedas">
                                <label class="form-check-label" for="checkRuedas">Estado de las ruedas</label>
                            </div>
                            <div class="form-check form-switch mb-3 fs-5">
                                <input class="form-check-input" type="checkbox" id="checkAceite" name="checkAceite" checked>
                                <label class="form-check-label" for="checkAceite">Nivel de aceite de motor</label>
                            </div>
                            <div class="form-check form-switch fs-5">
                                <input class="form-check-input" type="checkbox" id="checkAgua" name="checkAgua" checked>
                                <label class="form-check-label" for="checkAgua">Nivel de agua de batería</label>
                            </div>
                        </fieldset>
                    </div>
                </article>

                <!-- Subsección: Repuestos Utilizados -->
                <article class="accordion-item border-0 mb-1">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed fw-bold py-3" type="button" data-bs-toggle="collapse" data-bs-target="#collapseRepuestos">
                            <i class="bi bi-tools me-2 text-primary fs-5" aria-hidden="true"></i> 2. Repuestos Utilizados
                        </button>
                    </h2>
                    <div id="collapseRepuestos" class="accordion-collapse collapse" data-bs-parent="#accordionFormulario">
                        <fieldset class="accordion-body bg-light">
                            <legend class="visually-hidden">Detalle de Repuestos</legend>
                            <div class="row g-2 mb-3 bg-white p-2 rounded border">
                                <div class="col-8">
                                    <label for="repuesto1" class="visually-hidden">Descripción del repuesto 1</label>
                                    <input id="repuesto1" type="text" class="form-control form-control-sm border-0" placeholder="Descripción del repuesto" value="Filtro Hidráulico" name="repuesto1">
                                </div>
                                <div class="col-4">
                                    <label for="cantidad1" class="visually-hidden">Cantidad repuesto 1</label>
                                    <input id="cantidad1" type="number" class="form-control form-control-sm border-0 text-center" placeholder="Cant." value="1" name="cantidad1">
                                </div>
                            </div>
                            <div class="row g-2 bg-white p-2 rounded border">
                                <div class="col-8">
                                    <label for="repuesto2" class="visually-hidden">Descripción del repuesto 2</label>
                                    <input id="repuesto2" type="text" class="form-control form-control-sm border-0" placeholder="Descripción del repuesto" name="repuesto2">
                                </div>
                                <div class="col-4">
                                    <label for="cantidad2" class="visually-hidden">Cantidad repuesto 2</label>
                                    <input id="cantidad2" type="number" class="form-control form-control-sm border-0 text-center" placeholder="Cant." name="cantidad2">
                                </div>
                            </div>
                            <button class="btn btn-outline-secondary btn-sm w-100 mt-2" type="button"><i class="bi bi-plus" aria-hidden="true"></i> Agregar línea</button>
                        </fieldset>
                    </div>
                </article>

                <!-- Subsección: Observaciones -->
                <article class="accordion-item border-0 rounded-bottom">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed fw-bold py-3" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTrabajo">
                            <i class="bi bi-clipboard-data me-2 text-primary fs-5" aria-hidden="true"></i> 3. Observaciones
                        </button>
                    </h2>
                    <div id="collapseTrabajo" class="accordion-collapse collapse" data-bs-parent="#accordionFormulario">
                        <fieldset class="accordion-body">
                            <legend class="visually-hidden">Observaciones del Servicio</legend>
                            <label for="observations" class="visually-hidden">Observaciones</label>
                            <textarea id="observations" class="form-control bg-light" rows="4" placeholder="Describe la falla encontrada y la solución aplicada..." name="observations"></textarea>
                        </fieldset>
                    </div>
                </article>

            </section>

            <!-- Sección: Firma de Conformidad -->
            <fieldset class="card card-custom p-3 mb-4">
                <legend class="fw-bold text-secondary mb-3"><i class="bi bi-pen me-2" aria-hidden="true"></i>Firma de Conformidad</legend>
                <div class="canvas-container bg-light shadow">
                    <p class="text-muted mb-0">El cliente firmará aquí</p>
                    <p class="text-muted">(Espacio para Canvas JS)</p>
                </div>
                <div>
                    <label for="recipientName" class="form-label fw-bold text-secondary">Nombre de quien recibe</label>
                    <input id="recipientName" type="text" class="form-control form-control-lg mb-2 bg-light" placeholder="Nombre completo" name="recipientName">
                </div>
            </fieldset>

            <!-- Botón de Envío -->
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-brand btn-lg py-3 shadow text-uppercase fw-bold" aria-label="finalizar hoja de trabajo">
                    Finalizar hoja de trabajo
                </button>
            </div>
        </form>
</main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
